  <main>
    <section class="register">
      <div class="container">

        <!-- Step header (outside card, centered like figma) -->
        <div class="register-step">
          <div class="step-track" aria-hidden="true">
            <div class="step-dot done">✓</div>
            <div class="step-line"></div>
            <div class="step-dot current">2</div>
          </div>
          <div class="step-caption">Step 2 of 2</div>
        </div>

        <!-- Main card -->
        <div class="register-card">
          <p class="register-title">Complete Your Profile</p>
          <p class="register-subtitle">Just a few more details to get you started</p>

          <form id="signupForm" class="register-form" autocomplete="on">
            <div class="grid-two">
              <div class="field">
                <label class="field-label" for="firstName">First Name</label>
                <input class="field-input field-input-square" id="firstName" name="firstName" type="text" placeholder="John" required />
              </div>

              <div class="field">
                <label class="field-label" for="lastName">Last Name</label>
                <input class="field-input field-input-square" id="lastName" name="lastName" type="text" placeholder="Doe" required />
              </div>
            </div>

            <div class="field">
              <label class="field-label" for="phoneNumber">Phone Number</label>
              <input class="field-input field-input-square" id="phoneNumber" name="phoneNumber" type="tel" placeholder="(555) 123-4567" required />
              <p class="field-help">We'll use this to send you important updates.</p>
            </div>

            <button class="btn btn-primary register-submit" type="submit">
              Complete Registration
            </button>

            <div class="register-trust">
              <div class="trust-chip">
                <span class="chip-check">✓</span>
                <span>Secure &amp; Private</span>
              </div>
              <div class="trust-chip">
                <span class="chip-check">✓</span>
                <span>No Credit Card</span>
              </div>
            </div>
          </form>
        </div>

      </div>
    </section>
  </main>
