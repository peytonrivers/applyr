<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ApplyR • Tell Us About You</title>
  <link rel="stylesheet" href="skill.css" />
</head>

<body>
  <!-- HEADER -->
  <header class="site-header">
    <div class="header-box">
      <div class="header-box-left">
        <a href="index.html" aria-label="ApplyR home">
          <svg class="brand-icon" xmlns="http://www.w3.org/2000/svg" height="44" viewBox="0 -960 960 960" width="44" fill="currentColor" aria-hidden="true">

          </svg>
        </a>
        <a href="index.html" class="brand">ApplyR</a>
      </div>

      <div class="header-box-right">
        <a class="btn btn-primary" href="index.html">Home</a>
      </div>
    </div>
  </header>

  <main>
    <section class="register">
      <div class="container">
        <div class="register-card">
          <p class="register-title">Tell Us About You</p>
          <p class="register-subtitle">This helps match you with the right opportunities</p>

          <form id="skillForm" class="register-form" autocomplete="on">

            <div id="work-experience-section">
              <button type="button" class="btn btn-primary register-submit" id="show-work-experience">
                Add Work Experience +
              </button>

              <div id="work-experience" class="hidden">
                <div id="work-experience-container"></div>

                <button type="button" id="continue-work-experience">
                  + Add More Work Experience
                </button>
              </div>
            </div>

            <div id="education-section">
              <button type="button" class="btn btn-primary register-submit" id="show-education">
                Add Education +
              </button>

              <div id="education" class="hidden">
                <div id="education-container"></div>

                <button type="button" id="continue-education">
                  + Add More Education
                </button>
              </div>
            </div>

            <div class="field">
              <label class="field-label" for="resume">Resume</label>
              <label class="upload-box" for="resume">
                <span id="resumeFileName">Upload your resume</span>
                <span class="browse-pill">Browse</span>
              </label>
              <input class="file-input" type="file" id="resume" name="resume" accept=".pdf,.docx" required />
              <p class="field-help">PDF ONLY Max 5MB.</p>
            </div>

            <div class="field">
              <label class="field-label" for="coverLetter">Cover Letter</label>
              <label class="upload-box" for="coverLetter">
                <span id="coverLetterFileName">Upload your cover letter</span>
                <span class="browse-pill">Browse</span>
              </label>
              <input class="file-input" type="file" id="coverLetter" name="cover_letter" accept=".pdf,.docx" required />
              <p class="field-help">PDF or DOCX Max 5MB.</p>
            </div>

            <button class="btn btn-primary register-submit" type="submit">
              Save & Continue
            </button>

            <div class="register-trust">
              <div class="trust-chip">
                <span class="chip-lock">⌕</span>
                <span>Secure &amp; Private</span>
              </div>
            </div>

          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <span class="brand">ApplyR</span>
      </div>
      <div class="footer-copy">© 2026 ApplyR. All rights reserved.</div>
    </div>
  </footer>

  <script src="skill.js" defer></script>
</body>
</html>
